<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stand By Me — Ostinato Player</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Coming+Soon&family=Patrick+Hand&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      font-family: 'Patrick Hand', cursive;
      background: #f5f5f5;
      color: #222;
      height: 100%;
      overflow: hidden;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      display: grid;
      grid-template-rows: auto auto 1fr;
      grid-template-columns: 1fr;
      padding: 8px 16px;
      gap: 6px;
    }

    /* ---------- HEADER ---------- */
    .header {
      text-align: center;
    }

    .header h1 {
      font-family: 'Coming Soon', cursive;
      font-size: 1.4rem;
      margin-bottom: 1px;
    }

    .header .subtitle {
      font-size: 0.85rem;
      color: #555;
    }

    /* ---------- TRANSPORT BAR ---------- */
    .transport-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .transport-bar button {
      font-family: 'Patrick Hand', cursive;
      font-size: 1rem;
      padding: 6px 20px;
      border: 2px solid #222;
      border-radius: 10px;
      background: #fff;
      cursor: pointer;
      transition: all 0.15s;
      touch-action: manipulation;
    }

    .transport-bar button:hover,
    .transport-bar button:active { background: #e0e0e0; }
    .transport-bar button.playing { background: #222; color: #fff; }

    .skip-btn {
      background: #d4a017 !important;
      color: #222 !important;
      border-color: #d4a017 !important;
      font-weight: bold;
    }
    .skip-btn:hover, .skip-btn:active {
      background: #b8860b !important;
    }

    .tempo-control {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.95rem;
    }

    .tempo-control input[type="range"] {
      width: 120px;
      height: 22px;
      accent-color: #222;
    }

    .tempo-display {
      font-weight: bold;
      min-width: 60px;
      text-align: center;
      font-size: 0.95rem;
    }

    .beat-bar {
      display: flex;
      gap: 5px;
      margin-left: 16px;
    }

    .beat-dot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 2px solid #222;
      background: #fff;
      transition: background 0.05s, color 0.05s;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.45rem;
      font-weight: bold;
      color: #888;
      line-height: 1;
    }

    .beat-dot.active { background: #222; color: #fff; }
    .beat-dot.downbeat { border-width: 2.5px; }

    .measure-display {
      font-size: 0.9rem;
      color: #555;
      min-width: 100px;
    }

    .loop-toggle {
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      user-select: none;
    }

    .loop-toggle input { accent-color: #222; width: 18px; height: 18px; }

    /* ---------- MAIN CONTENT: two columns ---------- */
    .main-content {
      display: grid;
      grid-template-columns: 160px 1fr;
      gap: 14px;
      overflow: hidden;
    }

    /* ---------- LEFT: instruments ---------- */
    .instruments-panel {
      display: flex;
      flex-direction: column;
      gap: 6px;
      overflow-y: auto;
    }

    .instruments-panel h2 {
      font-family: 'Coming Soon', cursive;
      font-size: 1rem;
      text-align: center;
      flex-shrink: 0;
    }

    .part-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border: 2px solid #222;
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
      transition: all 0.15s;
      user-select: none;
      touch-action: manipulation;
      flex-shrink: 0;
    }

    .part-toggle:active { background: #d0d0d0; }
    .part-toggle.muted { opacity: 0.3; background: #eee; }

    .part-toggle .indicator {
      width: 16px;
      height: 16px;
      border-radius: 4px;
      border: 2px solid #222;
      background: #222;
      flex-shrink: 0;
    }

    .part-toggle.muted .indicator { background: #fff; }

    .part-toggle .part-name {
      font-size: 0.95rem;
      font-weight: bold;
    }

    .part-toggle .part-desc {
      font-size: 0.75rem;
      color: #666;
    }

    .part-toggle-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .vol-slider {
      width: 100%;
      height: 16px;
      accent-color: #222;
      margin-top: 4px;
      cursor: pointer;
    }

    /* ---------- RIGHT: lyrics ---------- */
    .lyrics-panel {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .lyrics-panel h2 {
      font-family: 'Coming Soon', cursive;
      font-size: 1rem;
      text-align: center;
      margin-bottom: 6px;
      flex-shrink: 0;
    }

    .lyrics-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      justify-content: center;
      margin-bottom: 8px;
      flex-shrink: 0;
    }

    .lyrics-tabs button {
      font-family: 'Patrick Hand', cursive;
      font-size: 0.9rem;
      padding: 5px 12px;
      border: 2px solid #222;
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
      transition: all 0.15s;
      touch-action: manipulation;
    }

    .lyrics-tabs button:active { background: #d0d0d0; }
    .lyrics-tabs button.active { background: #222; color: #fff; }

    .lyrics-tabs button.auto-advance {
      background: #444;
      color: #fff;
      border-color: #444;
    }

    .lyrics-tabs button.auto-advance.active {
      background: #d4a017;
      border-color: #d4a017;
      color: #222;
    }

    .lyrics-display {
      flex: 1;
      background: #fff;
      border: 3px solid #222;
      border-radius: 14px;
      padding: 30px 40px;
      font-size: 3.2rem;
      line-height: 1.7;
      text-align: center;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .lyrics-display .section-title {
      font-family: 'Coming Soon', cursive;
      font-weight: bold;
      font-size: 1rem;
      color: #999;
      margin-bottom: 2px;
      display: inline-block;
    }
    .back-link {
      position: absolute;
      top: 8px;
      left: 16px;
      font-size: 0.95rem;
      color: #555;
      text-decoration: none;
    }
    .back-link:hover { color: #222; }
  </style>
</head>
<body>

  <a class="back-link" href="index.html">&larr; Back to Hub</a>

  <!-- HEADER -->
  <div class="header">
    <h1>Stand By Me — Ostinato Player</h1>
    <div class="subtitle">Prince Royce | <span id="keyDisplay">Key of C</span></div>
  </div>

  <!-- TRANSPORT BAR -->
  <div class="transport-bar">
    <button id="skipPrevBtn" class="skip-btn" onclick="skipSection(-1)" style="display:none;">&larr; Prev</button>
    <button id="playBtn" onclick="togglePlay()">Play</button>
    <button onclick="stopAll()">Stop</button>
    <button id="skipNextBtn" class="skip-btn" onclick="skipSection(1)" style="display:none;">Next &rarr;</button>
    <div class="tempo-control">
      <span>Tempo:</span>
      <input type="range" id="tempoSlider" min="60" max="180" value="110" oninput="setTempo(this.value)">
      <span class="tempo-display" id="tempoDisplay">110 BPM</span>
    </div>
    <span class="measure-display" id="measureDisplay">Measure: — / 8</span>
    <div class="beat-bar" id="beatBar"></div>
    <label class="loop-toggle">
      <input type="checkbox" id="loopCheck" checked> Loop
    </label>
    <button id="transposeBtn" onclick="toggleTranspose()">Key: C</button>
  </div>

  <!-- MAIN: instruments left, lyrics right -->
  <div class="main-content">
    <div class="instruments-panel">
      <h2>Instruments</h2>
      <div id="partsContainer"></div>
    </div>
    <div class="lyrics-panel">
      <h2>Lyrics</h2>
      <div class="lyrics-tabs" id="lyricsTabs"></div>
      <div class="lyrics-display" id="lyricsDisplay">
        <div><em>Select a section above</em></div>
      </div>
    </div>
  </div>

  <script>
    // ===================== TRANSPOSE =====================

    let transposeOffset = 0; // 0 = Key of C, -3 = Key of A

    function tn(note) {
      if (transposeOffset === 0) return note;
      return Tone.Frequency(note).transpose(transposeOffset).toNote();
    }

    function toggleTranspose() {
      const wasPlaying = isPlaying;
      if (wasPlaying) stopAll();
      transposeOffset = transposeOffset === 0 ? -3 : 0;
      const keyLabel = transposeOffset === 0 ? "C" : "A";
      document.getElementById("transposeBtn").textContent = "Key: " + keyLabel;
      document.getElementById("keyDisplay").textContent = "Key of " + keyLabel;
      if (wasPlaying) startPlay();
    }

    // ===================== PART DEFINITIONS =====================

    const PARTS = {
      ukulele: {
        name: "Ukulele",
        desc: "Palm mute strum",
        muted: false,
        synth: null,
        volume: 1.0,
        gainNode: null,
        // Stand By Me rhythm: 8th, qr, 8th, qr, qr
        // In 8th note grid (8 per measure): hit on 1, hit on 4
        pattern: function(time, measure) {
          if (this.muted) return;
          const eighth = Tone.Time("8n").toSeconds();
          this.synth.triggerAttackRelease("C4", "16n", time, 0.3);
          this.synth.triggerAttackRelease("C4", "16n", time + eighth * 3, 0.3);
        }
      },
      cabasa: {
        name: "Cabasa",
        desc: "Eighth notes, accented",
        muted: false,
        synth: null,
        volume: 1.0,
        gainNode: null,
        pattern: function(time, measure) {
          if (this.muted) return;
          const eighth = Tone.Time("8n").toSeconds();
          for (let i = 0; i < 8; i++) {
            const accent = (i === 0 || i === 3);
            this.synth.triggerAttackRelease(
              accent ? "C5" : "C5",
              "32n",
              time + eighth * i,
              accent ? 0.8 : 0.25
            );
          }
        }
      },
      guiro: {
        name: "Guiro",
        desc: "Tap + scrapes",
        muted: false,
        synth: null,
        volume: 1.0,
        gainNode: null,
        // 8th tap, 2x16th scrape, 6x8th scrape
        pattern: function(time, measure) {
          if (this.muted) return;
          const eighth = Tone.Time("8n").toSeconds();
          const sixteenth = Tone.Time("16n").toSeconds();
          // Tap
          this.synthTap.triggerAttackRelease("32n", time);
          // 2 sixteenths + 6 eighths = 8 scrape hits, round-robin through pool
          const times = [
            time + eighth,
            time + eighth + sixteenth,
            time + eighth * 2,
            time + eighth * 3,
            time + eighth * 4,
            time + eighth * 5,
            time + eighth * 6,
            time + eighth * 7
          ];
          for (const t of times) {
            this.scrapePool[this.scrapeIndex].triggerAttackRelease("32n", t);
            this.scrapeIndex = (this.scrapeIndex + 1) % this.scrapePool.length;
          }
        }
      },
      bass: {
        name: "Bass",
        desc: "Walking bass line",
        muted: false,
        synth: null,
        volume: 1.0,
        gainNode: null,
        measures: [
          // m1 C
          [["C3","8n",0], ["C3","4n.",3], ["G2","8n",6], ["B2","8n",7]],
          // m2 C
          [["C3","8n",0], ["C3","4n.",3], ["C3","8n",6], ["B2","8n",7]],
          // m3 Am
          [["A2","8n",0], ["A2","4n.",3], ["G2","4n",6]],
          // m4 Am
          [["A2","8n",0], ["A2","4n.",3], ["A2","8n",6], ["G2","8n",7]],
          // m5 F
          [["F2","8n",0], ["F2","4n.",3], ["F2","8n",6], ["A2","8n",7]],
          // m6 G
          [["G2","8n",0], ["G2","4n.",3], ["B2","4n",6]],
          // m7 C
          [["C3","8n",0], ["C3","4n.",3], ["G2","8n",6], ["B2","8n",7]],
          // m8 C
          [["C3","8n",0], ["C3","4n.",3], ["G2","8n",6], ["B2","8n",7]],
        ],
        pattern: function(time, measure) {
          if (this.muted) return;
          const eighth = Tone.Time("8n").toSeconds();
          const notes = this.measures[measure];
          for (const [note, dur, pos] of notes) {
            this.synth.triggerAttackRelease(tn(note), dur, time + eighth * pos);
          }
        }
      },
      guitar: {
        name: "Guitar",
        desc: "Eighth note arpeggios",
        muted: false,
        synth: null,
        loaded: false,
        volume: 0.7,
        gainNode: null,
        measures: [
          // m1 C
          [["C4","8n",0],["G4","8n",1],["E4","8n",2],["C4","8n",3],["G4","8n",4],["E4","8n",5],["G3","8n",6],["B3","8n",7]],
          // m2 C
          [["C4","8n",0],["G4","8n",1],["E4","8n",2],["C4","8n",3],["G4","8n",4],["E4","8n",5],["C4","8n",6],["B3","8n",7]],
          // m3 Am
          [["A3","8n",0],["C4","8n",1],["E4","8n",2],["A3","8n",3],["C4","8n",4],["E4","8n",5],["E3","8n",6],["C4","8n",7]],
          // m4 Am
          [["A3","8n",0],["C4","8n",1],["E4","8n",2],["C4","8n",3],["F4","8n",4],["C4","8n",5],["E4","8n",6],["C4","8n",7]],
          // m5 F
          [["F3","8n",0],["A3","8n",1],["C4","8n",2],["F4","4n",3],["C4","8n",5],["F3","8n",6],["A3","8n",7]],
          // m6 G
          [["G4","8n",0],["D5","8n",1],["G5","8n",2],["B5","4n",3],["D5","8n",5],["G5","8n",6],["D5","8n",7]],
          // m7 C — C5 ties into m8
          [["C4","8n",0],["E4","8n",1],["G4","8n",2],["A4","4n",3],["G4","4n",5],["C5","4n",7]],
          // m8 C — C5 from m7 rings; E4 quarter, G4 quarter, G4 quarter, C4 eighth
          [["E4","4n",1],["G4","4n",3],["G4","4n",5],["C4","8n",7]],
        ],
        pattern: function(time, measure) {
          if (this.muted) return;
          const eighth = Tone.Time("8n").toSeconds();
          for (const [note, dur, pos] of this.measures[measure]) {
            this.synth.triggerAttackRelease(tn(note), dur, time + eighth * pos);
          }
        }
      },
      drums: {
        name: "Bass Drum",
        desc: "Dotted quarter pattern",
        muted: false,
        synth: null,
        volume: 1.0,
        gainNode: null,
        pattern: function(time, measure) {
          if (this.muted) return;
          const eighth = Tone.Time("8n").toSeconds();
          if (measure < 7) {
            // bd4. bd8 r4 r4
            this.synth.triggerAttackRelease("C1", "4n.", time, 0.9);
            this.synth.triggerAttackRelease("C1", "8n", time + eighth * 3, 0.7);
          } else {
            // m8: four quarter notes
            for (let i = 0; i < 4; i++) {
              this.synth.triggerAttackRelease("C1", "8n", time + eighth * 2 * i, 0.9);
            }
          }
        }
      },
      melody: {
        name: "Melody",
        desc: "Piano melody line",
        muted: false,
        synth: null,
        volume: 0.85,
        gainNode: null,
        measures: Array(8).fill([]),
        pattern: function(time, measure) {
          if (this.muted || !this.synth) return;
          const notes = this.measures[measure];
          if (!notes || notes.length === 0) return;
          const eighth = Tone.Time("8n").toSeconds();
          for (const [note, dur, pos] of notes) {
            this.synth.triggerAttackRelease(tn(note), eighth * dur, time + eighth * pos);
          }
        }
      }
    };

    function setMelodySection(label) {
      const m = MELODY_MEASURES[label];
      PARTS.melody.measures = m ? m.map(arr => arr.slice()) : Array(8).fill([]);
    }

    // ===================== INIT SYNTHS =====================

    function initSynths() {
      // ---- Master bus ----
      const masterComp = new Tone.Compressor({
        threshold: -20, ratio: 3, attack: 0.01, release: 0.1
      }).toDestination();

      const masterReverb = new Tone.Reverb({ decay: 1.5, wet: 0.15 }).connect(masterComp);

      function makePartGain(key, connectTo) {
        const g = new Tone.Gain(PARTS[key].volume).connect(connectTo);
        PARTS[key].gainNode = g;
        return g;
      }

      // ---- UKULELE ----
      const ukePartGain = makePartGain("ukulele", masterReverb);
      const ukeFilter = new Tone.Filter({ type: "lowpass", frequency: 1800, rolloff: -24 }).connect(ukePartGain);
      const ukeGain = new Tone.Gain(1.0).connect(ukeFilter);
      const ukeStrings = [];
      for (let i = 0; i < 4; i++) {
        ukeStrings.push(new Tone.PluckSynth({ attackNoise: 0.8, dampening: 1500, resonance: 0.88 }).connect(ukeGain));
      }
      PARTS.ukulele.synth = {
        triggerAttackRelease: function(note, dur, time, vel) {
          const chordNotes = ["G4", "C4", "E4", "C5"];
          chordNotes.forEach((n, i) => {
            ukeStrings[i].triggerAttackRelease(tn(n), "32n", time + 0.012 * i);
          });
        }
      };

      // ---- CABASA ----
      const cabasaPartGain = makePartGain("cabasa", masterComp);
      const cabasaFilter = new Tone.Filter({ type: "bandpass", frequency: 7000, Q: 1.5 }).connect(cabasaPartGain);
      const cabasaNoise = new Tone.NoiseSynth({
        noise: { type: "white" },
        envelope: { attack: 0.001, decay: 0.04, sustain: 0, release: 0.015 }
      }).connect(cabasaFilter);
      cabasaNoise.volume.value = -14;
      PARTS.cabasa.synth = {
        triggerAttackRelease: function(note, dur, time, vel) {
          cabasaNoise.volume.value = vel > 0.5 ? -10 : -20;
          cabasaNoise.triggerAttackRelease("32n", time);
        }
      };

      // ---- GUIRO ----
      const guiroPartGain = makePartGain("guiro", masterComp);
      const guiroTapFilter = new Tone.Filter({ type: "highpass", frequency: 5000 }).connect(guiroPartGain);
      const guiroTap = new Tone.NoiseSynth({
        noise: { type: "white" },
        envelope: { attack: 0.001, decay: 0.025, sustain: 0, release: 0.01 }
      }).connect(guiroTapFilter);
      guiroTap.volume.value = -8;
      PARTS.guiro.synthTap = guiroTap;

      const guiroScrapeFilter = new Tone.Filter({ type: "bandpass", frequency: 3500, Q: 2 }).connect(guiroPartGain);
      const scrapePool = [];
      for (let i = 0; i < 8; i++) {
        const s = new Tone.NoiseSynth({
          noise: { type: "pink" },
          envelope: { attack: 0.003, decay: 0.055, sustain: 0, release: 0.02 }
        }).connect(guiroScrapeFilter);
        s.volume.value = -14;
        scrapePool.push(s);
      }
      PARTS.guiro.scrapePool = scrapePool;
      PARTS.guiro.scrapeIndex = 0;

      // ---- BASS ----
      const bassPartGain = makePartGain("bass", masterComp);
      const bassFilter = new Tone.Filter({ type: "lowpass", frequency: 600, rolloff: -24 }).connect(bassPartGain);
      PARTS.bass.synth = new Tone.MonoSynth({
        oscillator: { type: "fmsine", modulationIndex: 0.8 },
        envelope: { attack: 0.03, decay: 0.25, sustain: 0.5, release: 0.4 },
        filterEnvelope: { attack: 0.02, decay: 0.2, sustain: 0.3, release: 0.3, baseFrequency: 120, octaves: 2.5 }
      }).connect(bassFilter);
      PARTS.bass.synth.volume.value = 0;

      // ---- GUITAR ----
      const guitarPartGain = makePartGain("guitar", masterReverb);
      const guitarFilter = new Tone.Filter({ type: "lowpass", frequency: 5000, rolloff: -12 }).connect(guitarPartGain);
      const guitarGain = new Tone.Gain(0.8).connect(guitarFilter);
      const guitarToggle = document.getElementById("toggle-guitar");
      if (guitarToggle) guitarToggle.querySelector(".part-desc").textContent = "Loading samples…";
      const guitarSampler = new Tone.Sampler({
        urls: { "E2": "E2.mp3", "A2": "A2.mp3", "D3": "D3.mp3", "G3": "G3.mp3", "B3": "B3.mp3", "E4": "E4.mp3" },
        baseUrl: "https://nbrosowsky.github.io/tonejs-instruments/samples/guitar-acoustic/",
        onload: () => {
          PARTS.guitar.loaded = true;
          if (guitarToggle) guitarToggle.querySelector(".part-desc").textContent = "Eighth note arpeggios";
        }
      }).connect(guitarGain);
      PARTS.guitar.synth = {
        triggerAttackRelease: function(note, dur, time) {
          if (!PARTS.guitar.loaded) return;
          guitarSampler.triggerAttackRelease(note, dur, time);
        }
      };

      // ---- BASS DRUM ----
      const drumsPartGain = makePartGain("drums", masterComp);
      const kickFilter = new Tone.Filter({ type: "lowpass", frequency: 200, rolloff: -12 }).connect(drumsPartGain);
      PARTS.drums.synth = new Tone.MembraneSynth({
        pitchDecay: 0.08, octaves: 6,
        envelope: { attack: 0.006, decay: 0.5, sustain: 0, release: 0.5 }
      }).connect(kickFilter);
      PARTS.drums.synth.volume.value = -2;

      // ---- MELODY ----
      const melodyPartGain = makePartGain("melody", masterReverb);
      PARTS.melody.synth = new Tone.Synth({
        oscillator: { type: "triangle" },
        envelope: { attack: 0.008, decay: 0.4, sustain: 0.3, release: 1.6 }
      }).connect(melodyPartGain);
      PARTS.melody.synth.volume.value = 2;
    }

    // ===================== TRANSPORT =====================

    let isPlaying = false;
    let currentMeasure = 0;
    let currentBeat = 0;
    let loopId = null;

    function togglePlay() {
      if (isPlaying) {
        stopAll();
      } else {
        startPlay();
      }
    }

    async function startPlay() {
      await Tone.start();
      if (!PARTS.ukulele.synth) initSynths();

      isPlaying = true;
      currentMeasure = 0;
      currentBeat = 0;
      document.getElementById("playBtn").classList.add("playing");
      document.getElementById("playBtn").textContent = "Pause";

      Tone.Transport.cancel();
      Tone.Transport.stop();
      Tone.Transport.position = 0;

      Tone.Transport.scheduleRepeat((time) => {
        const m = currentMeasure;
        const b = currentBeat;

        // Trigger parts on beat 0 of each measure
        if (b === 0) {
          for (const key in PARTS) {
            PARTS[key].pattern(time, m);
          }
        }

        // Capture global beat before advancing
        const globalBeat = m * 4 + b;
        const measNum = m;

        // Visual update — schedule relative to current audio time
        const delay = Math.max(0, (time - Tone.context.currentTime) * 1000);
        setTimeout(() => {
          updateBeatDisplayDirect(globalBeat);
          document.getElementById("measureDisplay").textContent =
            `Measure: ${measNum + 1} / 8`;
        }, delay);

        // Auto-advance lyrics — advance earlier (beat 27) if next section is a chorus
        if (autoAdvance) {
          if (globalBeat === 0) autoAdvancedThisLoop = false;
          if (!autoAdvancedThisLoop) {
            const next = (currentLyricsIndex + 1) % LYRICS.length;
            const nextLabel = LYRICS[next].label.toLowerCase();
            const isNextChorus = nextLabel.includes("chorus");
            const advanceBeat = isNextChorus ? 27 : 30;
            if (globalBeat === advanceBeat) {
              autoAdvancedThisLoop = true;
              setTimeout(() => showLyricsSection(next), delay);
            }
          }
        }

        // Advance
        currentBeat++;
        if (currentBeat >= 4) {
          currentBeat = 0;
          currentMeasure++;
          if (currentMeasure >= 8) {
            if (document.getElementById("loopCheck").checked) {
              currentMeasure = 0;
            } else {
              setTimeout(() => stopAll(), 0);
            }
          }
        }
      }, "4n");

      Tone.Transport.start("+0.1");
    }

    function stopAll() {
      isPlaying = false;
      Tone.Transport.stop();
      Tone.Transport.cancel();
      currentMeasure = 0;
      currentBeat = 0;
      document.getElementById("playBtn").classList.remove("playing");
      document.getElementById("playBtn").textContent = "Play";
      document.getElementById("measureDisplay").textContent = "Measure: — / 8";
      clearBeatDisplay();
    }

    function setTempo(val) {
      Tone.Transport.bpm.value = val;
      document.getElementById("tempoDisplay").textContent = val + " BPM";
    }

    // ===================== BEAT DISPLAY =====================

    function buildBeatBar() {
      const bar = document.getElementById("beatBar");
      bar.innerHTML = "";
      for (let i = 0; i < 32; i++) {
        const dot = document.createElement("div");
        dot.className = "beat-dot" + (i % 4 === 0 ? " downbeat" : "");
        dot.id = `beat-${i}`;
        dot.textContent = (i % 4) + 1;
        bar.appendChild(dot);
      }
    }

    function updateBeatDisplayDirect(globalBeat) {
      document.querySelectorAll(".beat-dot").forEach((d, i) => {
        d.classList.toggle("active", i === globalBeat);
      });
    }

    function clearBeatDisplay() {
      document.querySelectorAll(".beat-dot").forEach(d => d.classList.remove("active"));
    }

      const container = document.getElementById("partsContainer");
      for (const key in PARTS) {
        const part = PARTS[key];
        const div = document.createElement("div");
        div.className = "part-toggle";
        div.id = `toggle-${key}`;
        div.style.flexDirection = "column";
        div.style.alignItems = "stretch";

        const row = document.createElement("div");
        row.className = "part-toggle-row";
        row.innerHTML = `
          <div class="indicator"></div>
          <div>
            <div class="part-name">${part.name}</div>
            <div class="part-desc">${part.desc}</div>
          </div>
        `;
        row.addEventListener("click", () => {
          part.muted = !part.muted;
          div.classList.toggle("muted", part.muted);
        });

        const slider = document.createElement("input");
        slider.type = "range";
        slider.className = "vol-slider";
        slider.min = 0;
        slider.max = 100;
        slider.value = Math.round(part.volume * 100);
        slider.title = "Volume";
        slider.addEventListener("input", (e) => {
          part.volume = e.target.value / 100;
          if (part.gainNode) part.gainNode.gain.value = part.volume;
        });

        div.appendChild(row);
        div.appendChild(slider);
        container.appendChild(div);
      }
    }

    let autoAdvance = false;
    let currentLyricsIndex = 0;
    let autoAdvancedThisLoop = false;

    function buildLyricsTabs() {
      const tabs = document.getElementById("lyricsTabs");

      // Auto-advance button first
      const autoBtn = document.createElement("button");
      autoBtn.textContent = "Auto Advance";
      autoBtn.className = "auto-advance";
      autoBtn.id = "autoAdvanceBtn";
      autoBtn.addEventListener("click", toggleAutoAdvance);
      tabs.appendChild(autoBtn);

      LYRICS.forEach((section, i) => {
        const btn = document.createElement("button");
        btn.textContent = section.label;
        btn.dataset.index = i;
        btn.addEventListener("click", () => {
          showLyricsSection(i);
          if (autoAdvance) stopAutoAdvance();
        });
        tabs.appendChild(btn);
      });
    }

    function showLyricsSection(index) {
      currentLyricsIndex = index;
      const section = LYRICS[index];
      const display = document.getElementById("lyricsDisplay");

      // Update active tab (skip auto-advance button at index 0)
      document.querySelectorAll(".lyrics-tabs button[data-index]").forEach((btn) => {
        btn.classList.toggle("active", parseInt(btn.dataset.index) === index);
      });

      display.innerHTML =
        `<div class="section-title">[${section.label}]</div>` +
        section.lines.join("<br>");

      setMelodySection(section.label);
    }

    function toggleAutoAdvance() {
      if (autoAdvance) {
        stopAutoAdvance();
      } else {
        startAutoAdvance();
      }
    }

    function startAutoAdvance() {
      // If already playing, stop and restart from the beginning
      if (isPlaying) {
        stopAll();
      }
      autoAdvance = true;
      autoAdvancedThisLoop = false;
      document.getElementById("autoAdvanceBtn").classList.add("active");
      document.getElementById("skipPrevBtn").style.display = "";
      document.getElementById("skipNextBtn").style.display = "";
      showLyricsSection(0);
      startPlay();
    }

    function stopAutoAdvance() {
      autoAdvance = false;
      autoAdvancedThisLoop = false;
      document.getElementById("autoAdvanceBtn").classList.remove("active");
      document.getElementById("skipPrevBtn").style.display = "none";
      document.getElementById("skipNextBtn").style.display = "none";
    }

    function skipSection(direction) {
      const next = Math.max(0, Math.min(LYRICS.length - 1, currentLyricsIndex + direction));
      if (next === currentLyricsIndex) return;
      stopAll();
      showLyricsSection(next);
      autoAdvance = true;
      autoAdvancedThisLoop = false;
      document.getElementById("autoAdvanceBtn").classList.add("active");
      document.getElementById("skipPrevBtn").style.display = "";
      document.getElementById("skipNextBtn").style.display = "";
      setTimeout(() => {
        startPlay();
      }, 1000);
    }

    buildPartToggles();
    buildLyricsTabs();
